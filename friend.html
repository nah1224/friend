<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Merry 💖 Valentine</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
/* Global Styles */
* { box-sizing: border-box; margin:0; padding:0; }
body {
  height:100vh;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* Floating particles */
.particle { position: fixed; border-radius:50%; opacity:0.7; pointer-events:none; animation: moveParticle 8s linear infinite; }
@keyframes moveParticle { 0% { transform: translateY(0) scale(0.5); opacity:0.5; } 100% { transform: translateY(-900px) scale(1); opacity:0; } }

/* Card */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  padding:25px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
  width:90%;
  max-width:360px;
  position: relative;
}

/* Photo */
.photo { position: relative; margin-bottom:15px; }
.photo img {
  width:100%;
  height:auto;
  max-height:300px;
  border-radius:20px;
  object-fit:contain;
  border:3px solid #ff4d6d;
  animation: heartbeat 1s infinite;
}
.photo::after {
  content:"❤️";
  position:absolute;
  top:20%; left:35%;
  font-size:40px;
  color: rgba(255,0,50,0.5);
  animation: pulse 2s infinite;
}
@keyframes heartbeat { 0%,100% { transform:scale(1); } 25% { transform:scale(1.05); } 50% { transform:scale(1.1); } 75% { transform:scale(1.05); } }
@keyframes pulse { 0%,100% { transform:scale(1); opacity:0.6; } 50% { transform:scale(1.3); opacity:1; } }

/* Header */
h1 { color:#ff4d6d; font-size:22px; font-weight:600; margin-bottom:12px; text-shadow:0 2px 6px rgba(0,0,0,0.2); }

/* Buttons */
.buttons { display:flex; justify-content:center; gap:15px; margin-bottom:10px; }
button { padding:10px 24px; font-size:16px; border:none; border-radius:25px; cursor:pointer; font-weight:600; transition:0.3s; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
.yes { background: linear-gradient(135deg,#ff5c7c,#ff2a68); color:white; }
.no { background:#eee; }
button:hover { transform:scale(1.05); }

/* Playful NO button */
.no.move { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }

/* Message & signature */
.message { display:none; font-size:20px; color:#ff4d6d; margin-top:12px; font-weight:600; }
.signature { font-size:16px; color:#ff4d6d; margin-top:10px; font-weight:600; }
.tigrigna-text { font-size:18px; color:#ff4d6d; margin-top:10px; font-weight:600; }

/* Floating hearts */
.heart { position: fixed; bottom:-10px; color:red; animation: float 5s linear infinite; pointer-events:none; }
@keyframes float { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(-700px); opacity:0; } }

/* Music button */
#play-music {
  position: fixed;
  bottom:15px;
  right:15px;
  padding:10px 18px;
  border:none;
  border-radius:25px;
  background: #1e90ff; /* Blue button */
  color:white;
  font-size:16px;
  cursor:pointer;
  z-index:10;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  font-weight:600;
}
#play-music:hover {
  background: #0073e6; /* darker blue on hover */
  transform: scale(1.05);
}
</style>
</head>
<body>

<!-- Valentine Card -->
<div class="card">
  <div class="photo">
    <img src="Snapchat-871260337.jpg" alt="Us together">
  </div>

  <h1>Merry 💖 Will you be my Valentine?</h1>

  <div class="buttons">
    <button class="yes" onclick="yesLove()">YES ❤️</button>
    <button class="no" onclick="moveNo()">NO 🥺</button>
  </div>

  <div class="message" id="msg">
    Merry ❤️ I love you forever 💕
  </div>

  <div class="signature">— From Henok ❤️</div>
  <div class="tigrigna-text">ሜሪ   
  ❤️ ኣንቺ ለኔ ልዩ ነሽ.ፍቅሪ ቦታ ኣይግድቦን የኔ ቆንጆ😍</div>
</div>

<!-- Audio -->
<audio id="bg-music" loop>
  <source src="romantic-music.mp3" type="audio/mpeg">
  Your browser does not support audio
</audio>

<!-- Play Music Button -->
<button id="play-music">🎵 Play This Music</button>

<script>
const music = document.getElementById('bg-music');
const playBtn = document.getElementById('play-music');

/* Play music on click */
playBtn.addEventListener('click', () => {
  music.play();
  playBtn.style.display = 'none'; // hide button after play
});

/* YES button action */
function yesLove(){
  document.getElementById("msg").style.display="block";
  setInterval(createHeart,250);
}

/* NO button moves away */
function moveNo(){
  const btn = document.querySelector(".no");
  const x = Math.random() * (window.innerWidth - btn.offsetWidth);
  const y = Math.random() * (window.innerHeight - btn.offsetHeight);
  btn.style.position="absolute";
  btn.style.left = x+"px";
  btn.style.top = y+"px";
}

/* Floating hearts */
function createHeart(){
  const heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left = Math.random()*100+"vw";
  heart.style.fontSize = (16 + Math.random()*20)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
}

/* Random background particles */
for(let i=0;i<30;i++){
  const p = document.createElement("div");
  p.className="particle";
  p.style.left = Math.random()*100+"vw";
  p.style.top = Math.random()*100+"vh";
  p.style.background = `rgba(255,${Math.floor(Math.random()*100+100)},${Math.floor(Math.random()*100+100)},0.7)`;
  p.style.width = p.style.height = Math.random()*8+5+"px";
  document.body.appendChild(p);
}
</script>

</body>
</html>
